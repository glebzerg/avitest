[tool.black]
line-length = 100
target-version = ['py311']
exclude = '''
/(
    .git
  | __pycache__
  | .venv
  | venv
  | allure-results
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip = [".git", "__pycache__", ".venv", "venv", "allure-results"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
exclude = ["allure-results"]
