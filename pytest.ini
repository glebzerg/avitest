[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --alluredir=allure-results
markers =
    api: API tests
    e2e: End-to-end tests
    positive: Positive test cases
    negative: Negative test cases
    regression: Regression tests
